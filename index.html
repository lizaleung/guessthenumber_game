<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎉 Guess the Number! 🎉</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo 2', 'Comic Sans MS', cursive, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #ffe29f 0%, #ffa99f 25%, #ff719a 50%, #a18cd1 75%, #84fab0 100%);
    background-size: 300% 300%;
    animation: rainbow 18s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    color: #4a3f6b;
    overflow-x: hidden;
  }

  @keyframes rainbow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .card {
    background: rgba(255, 255, 255, 0.92);
    border-radius: 36px;
    padding: 28px 24px 32px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.18);
    width: 100%;
    max-width: 680px;
    text-align: center;
    border: 6px solid #fff;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 800;
    color: #ff5da2;
    text-shadow: 3px 3px 0 #ffe16b, 6px 6px 0 rgba(0,0,0,0.06);
    margin-bottom: 4px;
    line-height: 1.1;
  }

  .subtitle {
    font-size: 1.1rem;
    color: #7a6fae;
    margin-bottom: 20px;
    font-weight: 500;
  }

  /* ---- Setup screen ---- */
  .setup-row {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 18px;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-weight: 700; color: #6a5acd; font-size: 1rem; }
  .field input {
    font-family: inherit;
    font-size: 1.6rem;
    font-weight: 700;
    width: 110px;
    text-align: center;
    padding: 10px;
    border: 4px solid #ffd166;
    border-radius: 18px;
    color: #ff5da2;
    background: #fffdf5;
    outline: none;
  }
  .field input:focus { border-color: #ff5da2; }

  .btn {
    font-family: inherit;
    font-size: 1.5rem;
    font-weight: 800;
    border: none;
    border-radius: 22px;
    padding: 14px 30px;
    cursor: pointer;
    color: #fff;
    box-shadow: 0 6px 0 rgba(0,0,0,0.18);
    transition: transform .08s ease, box-shadow .08s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.18); }
  .btn-start { background: linear-gradient(180deg, #ff85b3, #ff5da2); }
  .btn-again { background: linear-gradient(180deg, #54d6a0, #2bb673); margin-top: 6px; }

  .hint-msg {
    min-height: 40px;
    font-size: 1.5rem;
    font-weight: 800;
    margin: 8px 0 14px;
    transition: color .2s ease;
  }
  .hint-neutral { color: #7a6fae; }
  .hint-up { color: #ff8c42; }
  .hint-down { color: #4d96ff; }
  .hint-win { color: #2bb673; }

  .stats {
    font-size: 1.2rem;
    font-weight: 700;
    color: #6a5acd;
    margin-bottom: 16px;
  }
  .stats .num { color: #ff5da2; }

  /* ---- Number board: horizontal tape ---- */
  .board {
    display: flex;
    flex-wrap: nowrap;
    gap: 10px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 16px 10px;
    background: repeating-linear-gradient(
      90deg, #fff7e0, #fff7e0 2px, #fffdf5 2px, #fffdf5 42px);
    border: 4px solid #ffd166;
    border-radius: 22px;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: #ff5da2 #ffe9b0;
  }
  .board::-webkit-scrollbar { height: 12px; }
  .board::-webkit-scrollbar-track { background: #ffe9b0; border-radius: 10px; }
  .board::-webkit-scrollbar-thumb { background: #ff85b3; border-radius: 10px; }
  .tile {
    font-family: inherit;
    font-size: 1.5rem;
    font-weight: 800;
    flex: 0 0 auto;
    width: 66px;
    height: 66px;
    border: none;
    border-radius: 18px;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.16);
    transition: transform .08s ease, box-shadow .08s ease;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  .tile:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.16); }
  .tile:hover { transform: scale(1.06); }

  /* wrong-guess: shrink + fade away */
  .tile.gone {
    animation: poof .35s ease forwards;
    pointer-events: none;
  }
  @keyframes poof {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3) rotate(8deg); opacity: .6; }
    100% { transform: scale(0); opacity: 0; }
  }
  .tile.winner {
    animation: winpop .6s ease infinite alternate;
  }
  @keyframes winpop {
    from { transform: scale(1); }
    to { transform: scale(1.18) rotate(-4deg); }
  }

  .hidden { display: none; }

  /* ---- Guessed-numbers tray ---- */
  .guess-box-wrap {
    margin-top: 22px;
    border-top: 4px dashed #ffd166;
    padding-top: 14px;
  }
  .guess-box-title {
    font-size: 1.2rem;
    font-weight: 800;
    color: #6a5acd;
    margin-bottom: 10px;
  }
  .guess-box {
    background: #fffdf5;
    border: 4px solid #ffd166;
    border-radius: 22px;
    padding: 12px;
    min-height: 64px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    align-items: center;
  }
  .guess-chip {
    font-size: 1.3rem;
    font-weight: 800;
    color: #fff;
    border-radius: 16px;
    padding: 8px 14px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.14);
    display: flex;
    align-items: center;
    gap: 6px;
    animation: chipIn .35s ease;
  }
  @keyframes chipIn {
    from { transform: scale(0.3); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .chip-up { background: linear-gradient(180deg, #ffb14e, #ff8c42); }
  .chip-down { background: linear-gradient(180deg, #6aa9ff, #4d96ff); }

  .big-emoji { font-size: 3.4rem; line-height: 1; margin: 4px 0; }

  /* confetti */
  .confetti {
    position: fixed; top: -20px; width: 12px; height: 18px;
    opacity: 0.9; z-index: 50; border-radius: 3px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0.9; }
  }
</style>
</head>
<body>
  <div class="card">
    <h1>🎈 Guess the Number! 🎈</h1>

    <!-- SETUP -->
    <div id="setup">
      <p class="subtitle">Pick your numbers and find the hidden one! 🕵️</p>
      <div class="setup-row">
        <div class="field">
          <label for="minInput">From</label>
          <input id="minInput" type="number" value="1" inputmode="numeric" />
        </div>
        <div class="field">
          <label for="maxInput">To</label>
          <input id="maxInput" type="number" value="20" inputmode="numeric" />
        </div>
      </div>
      <p id="setupError" class="hint-msg hint-up"></p>
      <button class="btn btn-start" onclick="startGame()">Let's Play! ▶️</button>
    </div>

    <!-- GAME -->
    <div id="game" class="hidden">
      <p id="hint" class="hint-msg hint-neutral">Tap a number to guess! 👆</p>
      <p class="stats">Guesses: <span id="guessCount" class="num">0</span></p>
      <div id="board" class="board"></div>

      <!-- Tray of numbers the player has already guessed -->
      <div id="guessBoxWrap" class="guess-box-wrap hidden">
        <p class="guess-box-title">📋 Numbers you guessed</p>
        <div id="guessBox" class="guess-box"></div>
      </div>
    </div>

    <!-- WIN -->
    <div id="win" class="hidden">
      <div class="big-emoji">🏆🎉🥳</div>
      <h1 style="color:#2bb673;">You did it!</h1>
      <p class="subtitle">The number was <strong id="winNumber" style="color:#ff5da2;">?</strong>.
        You found it in <strong id="winGuesses" style="color:#ff5da2;">0</strong> guesses! 🌟</p>
      <button class="btn btn-again" onclick="resetToSetup()">Play Again 🔄</button>
    </div>
  </div>

<script>
  // Bright kid-friendly tile colors, picked in rotation
  const COLORS = [
    '#ff6b6b', '#ff924c', '#ffca3a', '#8ac926',
    '#52a675', '#1982c4', '#4d96ff', '#9b5de5',
    '#f15bb5', '#00bbf9', '#fb5607', '#06d6a0'
  ];

  let secret = 0;
  let guesses = 0;

  function startGame() {
    const min = parseInt(document.getElementById('minInput').value, 10);
    const max = parseInt(document.getElementById('maxInput').value, 10);
    const err = document.getElementById('setupError');

    // Kid-friendly validation
    if (Number.isNaN(min) || Number.isNaN(max)) {
      err.textContent = 'Please type two numbers! 🔢'; return;
    }
    if (min >= max) {
      err.textContent = 'The first number must be smaller! 😊'; return;
    }
    if (max - min > 199) {
      err.textContent = 'That\'s a lot of numbers! Try a smaller range. 🙂'; return;
    }
    err.textContent = '';

    secret = Math.floor(Math.random() * (max - min + 1)) + min;
    guesses = 0;
    document.getElementById('guessCount').textContent = '0';
    document.getElementById('hint').textContent = 'Tap a number to guess! 👆';
    document.getElementById('hint').className = 'hint-msg hint-neutral';
    document.getElementById('guessBox').innerHTML = '';
    document.getElementById('guessBoxWrap').classList.add('hidden');

    buildBoard(min, max);

    document.getElementById('setup').classList.add('hidden');
    document.getElementById('win').classList.add('hidden');
    document.getElementById('game').classList.remove('hidden');
  }

  function buildBoard(min, max) {
    const board = document.getElementById('board');
    board.innerHTML = '';
    let c = 0;
    for (let n = min; n <= max; n++) {
      const tile = document.createElement('button');
      tile.className = 'tile';
      tile.textContent = n;
      tile.style.background = COLORS[c % COLORS.length];
      c++;
      tile.onclick = () => guess(n, tile);
      board.appendChild(tile);
    }
  }

  function guess(n, tile) {
    guesses++;
    document.getElementById('guessCount').textContent = guesses;
    const hint = document.getElementById('hint');

    if (n === secret) {
      tile.classList.add('winner');
      hint.textContent = '🎉 YES! That\'s it! 🎉';
      hint.className = 'hint-msg hint-win';
      celebrate();
      setTimeout(showWin, 1200);
    } else if (n < secret) {
      // Too low: sweep away every number up to and including the guess
      removeWhere(v => v <= n);
      addGuessChip(n, 'up');
      hint.textContent = '⬆️ Try a BIGGER number!';
      hint.className = 'hint-msg hint-up';
    } else {
      // Too high: sweep away every number from the guess and up
      removeWhere(v => v >= n);
      addGuessChip(n, 'down');
      hint.textContent = '⬇️ Try a SMALLER number!';
      hint.className = 'hint-msg hint-down';
    }
  }

  // Add the guessed number as a chip in the tray at the bottom
  function addGuessChip(n, dir) {
    const box = document.getElementById('guessBox');
    document.getElementById('guessBoxWrap').classList.remove('hidden');
    const chip = document.createElement('div');
    chip.className = 'guess-chip ' + (dir === 'up' ? 'chip-up' : 'chip-down');
    chip.textContent = (dir === 'up' ? '⬆️ ' : '⬇️ ') + n;
    box.appendChild(chip);
  }

  // Hide all still-visible tiles whose number matches the test
  function removeWhere(test) {
    document.querySelectorAll('#board .tile').forEach((t, i) => {
      const v = parseInt(t.textContent, 10);
      if (test(v) && !t.classList.contains('gone')) {
        // tiny stagger so they poof in a fun little wave
        t.style.animationDelay = (i % 8) * 0.03 + 's';
        t.classList.add('gone');
        // after the poof, collapse out of the tape so numbers slide together
        t.addEventListener('animationend', () => { t.style.display = 'none'; }, { once: true });
      }
    });
  }

  function showWin() {
    document.getElementById('winNumber').textContent = secret;
    document.getElementById('winGuesses').textContent = guesses;
    document.getElementById('game').classList.add('hidden');
    document.getElementById('win').classList.remove('hidden');
  }

  function resetToSetup() {
    document.getElementById('win').classList.add('hidden');
    document.getElementById('game').classList.add('hidden');
    document.getElementById('setup').classList.remove('hidden');
  }

  function celebrate() {
    for (let i = 0; i < 80; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
      c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      c.style.animationDelay = (Math.random() * 0.5) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }
</script>
</body>
</html>
